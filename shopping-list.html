<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #5a67d8; }

    .stats {
      font-size: 0.82rem;
      color: #a0aec0;
      margin-bottom: 12px;
    }

    .stats span { color: #667eea; font-weight: 600; }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      background: #fafafa;
      transition: background 0.2s, opacity 0.2s;
    }

    li.checked {
      background: #f0fff4;
      border-color: #c6f6d5;
      opacity: 0.75;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: color 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
      color: #e53e3e;
      border-color: #fed7d7;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🛒 쇼핑 리스트</h1>
  <p class="subtitle">오늘 사야 할 것들을 적어보세요</p>

  <div class="input-row">
    <input type="text" id="itemInput" placeholder="아이템 입력..." autocomplete="off">
    <button onclick="addItem()">추가</button>
  </div>

  <div class="stats" id="stats"></div>

  <ul id="list"></ul>

  <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

  function save() {
    localStorage.setItem('shoppingList', JSON.stringify(items));
  }

  function render() {
    const list = document.getElementById('list');
    const stats = document.getElementById('stats');

    if (items.length === 0) {
      list.innerHTML = '<li style="border:none;background:none;justify-content:center"><span class="empty">아직 아이템이 없어요 ✨</span></li>';
      stats.innerHTML = '';
      return;
    }

    const done = items.filter(i => i.checked).length;
    stats.innerHTML = `총 <span>${items.length}</span>개 · 완료 <span>${done}</span>개`;

    list.innerHTML = items.map((item, idx) => `
      <li class="${item.checked ? 'checked' : ''}">
        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggle(${idx})">
        <span class="item-text">${escapeHtml(item.text)}</span>
        <button class="delete-btn" onclick="remove(${idx})" title="삭제">✕</button>
      </li>
    `).join('');
  }

  function addItem() {
    const input = document.getElementById('itemInput');
    const text = input.value.trim();
    if (!text) return;
    items.push({ text, checked: false });
    input.value = '';
    save();
    render();
    input.focus();
  }

  function toggle(idx) {
    items[idx].checked = !items[idx].checked;
    save();
    render();
  }

  function remove(idx) {
    items.splice(idx, 1);
    save();
    render();
  }

  function clearChecked() {
    items = items.filter(i => !i.checked);
    save();
    render();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('itemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  render();
</script>
</body>
</html>
